version: "2"
linters:
  enable:
    - sloglint
    - gocritic
    - govet
    - unconvert
    - unparam
    - ineffassign
    - sqlclosecheck
    - wastedassign
#    - gochecknoglobals
  disable:
    - errcheck
  settings:
    sloglint:
      no-mixed-args: true
      attr-only: true
      context: all
    staticcheck:
      checks:
        - all
        - -QF1001
    gocritic:
      disabled-checks:
        - commentFormatting
        - ifElseChain
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
